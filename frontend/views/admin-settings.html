    <!-- Sidebar -->

    <!-- Main Content -->
    <div class="main-content">
        <!-- Topbar -->
        <div class="topbar">
            <button id="mobileMenuToggle" class="mobile-toggle-btn d-md-none"><i class="fa-solid fa-bars"></i></button>
            <h4 class="mb-0 fw-bold" style="color: var(--primary-color);">Manage Banners</h4>
            <div class="d-flex align-items-center">
                <div class="me-3 text-end">
                    <span class="d-block fw-bold" id="headerUserRoleDisplay" style="font-size: 14px;">Loading...</span>
                    <span class="d-block text-muted" style="font-size: 12px; cursor: pointer;" onclick="showLogoutModal()">Log out</span>
                </div>
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </div>

        
<div class="row g-4">
    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white p-4 border-0"><h5 class="fw-bold mb-0">Upload New Banner</h5></div>
            <div class="card-body p-4 pt-0">
                <form id="bannerForm">
                    <div class="mb-3">
                        <label>Banner Image File</label>
                        <input type="file" id="bImg" class="form-control" accept="image/*" required>
                        <div class="mt-2 text-center d-none" id="bImgPreviewContainer">
                            <img id="bImgPreview" src="" class="img-fluid rounded shadow-sm" style="max-height: 150px;">
                        </div>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="bActive" checked>
                        <label class="form-check-label" for="bActive">Activate instantly</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Upload Banner</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white p-4 border-0"><h5 class="fw-bold mb-0">Active Homepage Banners</h5></div>
            <div class="card-body p-4 pt-0">
                <div class="row g-3" id="bannerGrid"></div>
            </div>
        </div>
    </div>
</div>

            </div>
        </div>

    </div>

    <script>
function checkAuth() {
            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.style.display = 'none';
            }, 300);
        }

        async function showLogoutModal() {
            const confirmed = await UIModals.confirm('Logout', 'Are you sure you want to logout?', 'Logout', 'danger');
            if(confirmed) {
                confirmLogout();
            }
        }

        async function confirmLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch(e) { console.error(e); }
            
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace('admin-login.html');
        }

checkAuth();

// Inject Page Specific Logic

async function loadBanners() {
    const res = await fetch('/api/banners/all'); // Need token for /all if protected, actually it's unprotected in our route
    const banners = await res.json();
    let html = '';
    banners.forEach(b => {
        html += `
        <div class="col-md-6">
            <div class="card">
                <img src="${b.imageUrl}" class="card-img-top" style="height: 150px; object-fit: cover;">
                <div class="card-body text-center">
                    <span class="badge ${b.isActive ? 'bg-success' : 'bg-secondary'} mb-2">${b.isActive ? 'Active' : 'Inactive'}</span><br>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteBanner('${b.id}')">Delete</button>
                </div>
            </div>
        </div>`;
    });
    document.getElementById('bannerGrid').innerHTML = html;
}

document.getElementById('bImg').addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        document.getElementById('bImgPreview').src = URL.createObjectURL(file);
        document.getElementById('bImgPreviewContainer').classList.remove('d-none');
    } else {
        document.getElementById('bImgPreviewContainer').classList.add('d-none');
    }
});

document.getElementById('bannerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const fd = new FormData();
    fd.append('image', document.getElementById('bImg').files[0]);
    fd.append('isActive', document.getElementById('bActive').checked);
    
    try {
        const res = await fetch('/api/banners', {
            method: 'POST',
            body: fd
        });
        if(res.ok) {
            await UIModals.alert('Success', 'Banner uploaded successfully!', 'success');
        } else {
            const data = await res.json();
            await UIModals.alert('Error', data.message || 'Error uploading banner', 'danger');
        }
    } catch(err) {
        await UIModals.alert('Error', 'Connection error', 'danger');
    }
    
    document.getElementById('bannerForm').reset();
    document.getElementById('bImgPreviewContainer').classList.add('d-none');
    loadBanners();
});

async function deleteBanner(id) {
    if(await UIModals.confirm('Confirm', 'Delete this banner?', 'Confirm', 'danger')) {
        
        await fetch('/api/banners/' + id, { method: 'DELETE' });
        loadBanners();
    }
}
loadBanners();

</script>

    <script>
        // Fetch and display user role
        async function fetchUserRole() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    const roleDisplay = document.getElementById('headerUserRoleDisplay');
                    if (roleDisplay) {
                        roleDisplay.innerText = user.role;
                    }
                }
            } catch (e) {
                console.error('Failed to fetch user role:', e);
            }
        }
        fetchUserRole();
    </script>

    
    </div>
