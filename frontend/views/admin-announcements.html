<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Announcements | Delta International School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css" rel="stylesheet">
    <link href="../assets/css/admin-datatables.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    
    <link rel="icon" type="image/png" href="../assets/images/logo.png">

    <!-- Anti-caching for protected routes -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="../assets/css/admin-layout.css">
</head>
<body>
    <div id="loadingOverlay">
        <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
        <h5 class="text-muted">Loading Announcements...</h5>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <button id="sidebarCloseBtn" class="sidebar-close-btn d-md-none"><i class="fa-solid fa-xmark"></i></button>
        <a href="#" class="brand d-flex align-items-center" style="gap: 10px; padding: 15px 20px;">
            <img src="../assets/images/logo.png" alt="Logo" style="height: 35px; width: auto; flex-shrink: 0;">
            <span style="font-size: 15px; line-height: 1.2; white-space: normal; text-align: left;">Delta International School</span>
        </a>
                <a href="admin-dashboard.html" class="nav-item"><i class="fa-solid fa-table-columns"></i> <span>Dashboard</span></a>
        <a href="admin-announcements.html" class="nav-item active"><i class="fa-solid fa-bullhorn"></i> <span>Announcements</span></a>
        <a href="admin-admissions.html" class="nav-item"><i class="fa-solid fa-user-graduate"></i> <span>Admissions</span></a>
        <a href="admin-teachers.html" class="nav-item"><i class="fa-solid fa-chalkboard-user"></i> <span>Teachers</span></a>
        <a href="admin-top-students.html" class="nav-item"><i class="fa-solid fa-award"></i> <span>Top Students</span></a>
        <a href="admin-events.html" class="nav-item"><i class="fa-solid fa-calendar-days"></i> <span>Events</span></a>
        <a href="admin-gallery.html" class="nav-item"><i class="fa-solid fa-images"></i> <span>Gallery</span></a>
        <a href="admin-enquiries.html" class="nav-item"><i class="fa-solid fa-envelope"></i> <span>Enquiries</span></a>
        <a href="admin-content.html" class="nav-item"><i class="fa-solid fa-file-lines"></i> <span>Site Content</span></a>
        <a href="admin-settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> <span>App Settings</span></a>
        <a href="admin-users.html" class="nav-item"><i class="fa-solid fa-users-gear"></i> <span>Admin Users</span></a>
</div>

    <div class="main-content">
        <div class="topbar">
            <button id="mobileMenuToggle" class="mobile-toggle-btn d-md-none"><i class="fa-solid fa-bars"></i></button>
            <h4 class="mb-0 fw-bold" style="color: var(--primary-color);">Manage Announcements</h4>
            <div class="d-flex align-items-center">
                <button class="btn btn-primary" onclick="openAddModal()"><i class="fa-solid fa-plus me-2"></i> Add Announcement</button>
                <div class="ms-3 text-end">
                    <span class="d-block fw-bold" id="headerUserRoleDisplay" style="font-size: 14px;">Loading...</span>
                    <span class="d-block text-muted" style="font-size: 12px; cursor: pointer;" onclick="showLogoutModal()">Log out</span>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="announcementsTableEl" style="width:100%">
                        <thead>
                            <tr>
                                <th>Display Order</th>
                                <th>Text</th>
                                <th>Color</th>
                                <th>Link URL</th>
                                <th>Active Dates</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="announcementsTable">
                            <tr class="skeleton-row"><td colspan="7"><div class="skeleton-box"></div></td></tr>
                            <tr class="skeleton-row"><td colspan="7"><div class="skeleton-box"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Announcement Modal -->
    <div class="modal fade" id="announcementModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Announcement</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="announcementForm">
                        <input type="hidden" id="announcementId">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Announcement Text *</label>
                            <textarea class="form-control" id="text" rows="2" required></textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Text Color</label>
                                <input type="color" class="form-control form-control-color w-100" id="color" value="#ffffff" title="Choose text color">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Display Order</label>
                                <input type="number" class="form-control" id="displayOrder" value="0">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Link URL (Optional)</label>
                            <input type="text" class="form-control" id="linkUrl" placeholder="e.g., admissions.html">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Start Date (Optional)</label>
                                <input type="date" class="form-control" id="startDate">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">End Date (Optional)</label>
                                <input type="date" class="form-control" id="endDate">
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="isActive" checked>
                                <label class="form-check-label fw-bold" for="isActive">Active (Display on website)</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold">Save Announcement</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    
    
    </div>

    <!-- jQuery & DataTables JS -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>
    <script src="../assets/js/admin-datatables.js"></script>
    <script>
        const announcementModal = new bootstrap.Modal(document.getElementById('announcementModal'));

        async function fetchAnnouncements() {
            try {
                const res = await fetch('/api/announcements/all');
                if (res.status === 401 || res.status === 403) {
                    window.location.href = 'admin-login.html';
                    return;
                }
                const data = await res.json();
                renderTable(data);
                document.getElementById('loadingOverlay').style.display = 'none';
            } catch (err) {
                console.error(err);
                document.getElementById('loadingOverlay').style.display = 'none';
                await UIModals.alert('Error', 'Failed to load announcements.', 'danger');
            }
        }

        function renderTable(announcements) {
            if ($.fn.DataTable.isDataTable('#announcementsTableEl')) {
                $('#announcementsTableEl').DataTable().destroy();
            }

            const tbody = document.getElementById('announcementsTable');
            tbody.innerHTML = '';
            announcements.forEach(a => {
                const startDateStr = a.startDate ? new Date(a.startDate).toLocaleDateString() : 'N/A';
                const endDateStr = a.endDate ? new Date(a.endDate).toLocaleDateString() : 'N/A';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${a.displayOrder}</td>
                    <td class="fw-bold" style="color: ${a.color}; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 5px;">${a.text}</td>
                    <td><div style="width: 25px; height: 25px; background: ${a.color}; border: 1px solid #ccc; border-radius: 4px;"></div></td>
                    <td>${a.linkUrl ? `<a href="${a.linkUrl}" target="_blank">${a.linkUrl}</a>` : '-'}</td>
                    <td style="font-size: 0.85rem;">${startDateStr} <br>to<br> ${endDateStr}</td>
                    <td>
                        <span class="badge ${a.isActive ? 'bg-success' : 'bg-secondary'}">${a.isActive ? 'Active' : 'Inactive'}</span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-2" onclick="editAnnouncement(${a.id})"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteAnnouncement(${a.id})"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            initAdminDataTable('#announcementsTableEl', {
                searchPlaceholder: "Search by Title/Text...",
                filtersHtml: `
                    <select id="filterStatus" class="form-select dt-custom-filter">
                        <option value="">All Statuses</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                `,
                customFilterFn: function(settings, data, dataIndex) {
                    const statusVal = ($('#filterStatus').val() || '').toLowerCase();
                    const rowStatus = data[5].toLowerCase(); // Status column
                    if (statusVal && !rowStatus.includes(statusVal)) return false;
                    return true;
                }
            });
        }
        window.refreshTableData = fetchAnnouncements;

        function openAddModal() {
            document.getElementById('announcementForm').reset();
            document.getElementById('announcementId').value = '';
            document.getElementById('modalTitle').innerText = 'Add Announcement';
            document.getElementById('isActive').checked = true;
            document.getElementById('color').value = '#ffffff';
            announcementModal.show();
        }

        async function editAnnouncement(id) {
            try {
                const res = await fetch('/api/announcements/all');
                const announcements = await res.json();
                const a = announcements.find(x => x.id === id);
                if (a) {
                    document.getElementById('announcementId').value = a.id;
                    document.getElementById('text').value = a.text;
                    document.getElementById('color').value = a.color || '#ffffff';
                    document.getElementById('displayOrder').value = a.displayOrder;
                    document.getElementById('linkUrl').value = a.linkUrl || '';
                    document.getElementById('startDate').value = a.startDate ? a.startDate.split('T')[0] : '';
                    document.getElementById('endDate').value = a.endDate ? a.endDate.split('T')[0] : '';
                    document.getElementById('isActive').checked = a.isActive;
                    
                    document.getElementById('modalTitle').innerText = 'Edit Announcement';
                    announcementModal.show();
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('announcementForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('announcementId').value;
            
            const payload = {
                text: document.getElementById('text').value,
                color: document.getElementById('color').value,
                displayOrder: document.getElementById('displayOrder').value,
                linkUrl: document.getElementById('linkUrl').value || null,
                startDate: document.getElementById('startDate').value || null,
                endDate: document.getElementById('endDate').value || null,
                isActive: document.getElementById('isActive').checked
            };

            try {
                const url = id ? `/api/announcements/${id}` : '/api/announcements';
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, { 
                    method, 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload) 
                });
                
                if (res.ok) {
                    announcementModal.hide();
                    fetchAnnouncements();
                } else {
                    const data = await res.json();
                    await UIModals.alert('Error', data.message || 'Error saving announcement', 'danger');
                }
            } catch (err) {
                console.error(err);
                await UIModals.alert('Error', 'Connection error', 'danger');
            }
        });

        async function deleteAnnouncement(id) {
            if(await UIModals.confirm('Confirm', 'Are you sure you want to delete this announcement?', 'Confirm', 'danger')) {
                try {
                    const res = await fetch(`/api/announcements/${id}`, { method: 'DELETE' });
                    if (res.ok) fetchAnnouncements();
                    else await UIModals.alert('Error', 'Error deleting announcement', 'danger');
                } catch (err) {
                    console.error(err);
                }
            }
        }

        
        async function showLogoutModal() {
            const confirmed = await UIModals.confirm('Logout', 'Are you sure you want to logout?', 'Logout', 'danger');
            if(confirmed) {
                confirmLogout();
            }
        }

        async function confirmLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch(e) { console.error(e); }
            
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace('admin-login.html');
        }


        document.addEventListener('DOMContentLoaded', fetchAnnouncements);
    </script>

    <script>
        // Fetch and display user role
        async function fetchUserRole() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    const roleDisplay = document.getElementById('headerUserRoleDisplay');
                    if (roleDisplay) {
                        roleDisplay.innerText = user.role;
                    }
                }
            } catch (e) {
                console.error('Failed to fetch user role:', e);
            }
        }
        fetchUserRole();
    </script>
    <script src="../assets/js/ui-modals.js"></script>
    <script src="../assets/js/admin-layout.js"></script>
</body>
</html>
