<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Students | Delta International School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    
    
    
    

    
    <global-header></global-header>

    <header class="page-header text-center">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Academic Excellence</h1>
            <p class="lead text-white-50 mx-auto" style="max-width: 700px;">Celebrating the outstanding achievements of our top-performing students across all standards.</p>
        </div>
    </header>

    <section class="section-padding bg-light" style="min-height: 60vh;">
        <div class="container" id="studentsContainer">
            <div class="col-12 text-center text-muted py-5" id="loadingState">
                <div class="spinner-border text-primary mb-3" role="status"></div>
                <p>Loading top students...</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 Delta International School. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function fetchTopStudents() {
            try {
                const res = await fetch('/api/top-students');
                if (res.ok) {
                    const students = await res.json();
                    renderStudents(students);
                } else {
                    document.getElementById('loadingState').innerHTML = '<p class="text-danger">Failed to load top students.</p>';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loadingState').innerHTML = '<p class="text-danger">Connection error.</p>';
            }
        }

        function renderStudents(students) {
            const container = document.getElementById('studentsContainer');
            
            if (students.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-5">No top students records found.</div>';
                return;
            }

            // Group by Academic Year and then by Class
            const grouped = {};
            students.forEach(s => {
                if (!grouped[s.academic_year]) grouped[s.academic_year] = {};
                if (!grouped[s.academic_year][s.studentClass]) grouped[s.academic_year][s.studentClass] = [];
                grouped[s.academic_year][s.studentClass].push(s);
            });

            let html = '';

            // Render Years
            for (const year in grouped) {
                html += `<div class="text-center mb-5"><span class="badge bg-primary rounded-pill px-4 py-2 fs-5">Academic Year: ${year}</span></div>`;
                
                // Render Classes
                for (const studentClass in grouped[year]) {
                    html += `
                    <div class="mb-5 pb-4 border-bottom">
                        <div class="text-center">
                            <h2 class="class-section-title">Standard / Class: ${studentClass}</h2>
                        </div>
                        <div class="row g-5 justify-content-center mt-2">
                    `;

                    // Render Students in Class
                    const classStudents = grouped[year][studentClass];
                    classStudents.forEach(s => {
                        const img = s.photo ? s.photo : 'https://images.unsplash.com/photo-1544717305-2782549b5136?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80'; // Fallback generic avatar
                        
                        let rankIcon = '';
                        let rankClass = `rank-${s.rank}`;
                        if (s.rank === 1) rankIcon = '<i class="fa-solid fa-trophy"></i>';
                        else if (s.rank === 2) rankIcon = '<i class="fa-solid fa-medal"></i>';
                        else if (s.rank === 3) rankIcon = '<i class="fa-solid fa-award"></i>';
                        else rankClass = 'bg-secondary'; // Fallback

                        html += `
                        <div class="col-md-6 col-lg-4 mt-5">
                            <div class="student-card">
                                <div class="rank-badge ${rankClass}">
                                    ${rankIcon}
                                </div>
                                <img src="${img}" alt="${s.name}" class="student-photo">
                                <h4 class="student-name">${s.name}</h4>
                                <div class="text-muted text-uppercase small fw-bold tracking-wide">Rank ${s.rank}</div>
                                <div class="student-score">${s.percentage}%</div>
                            </div>
                        </div>`;
                    });

                    html += `</div></div>`;
                }
            }

            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', fetchTopStudents);
    </script>
    <script src="../assets/js/global-header.js" defer></script>
</body>
</html>
