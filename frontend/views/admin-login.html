<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Delta International School</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <link rel="stylesheet" href="../assets/css/admin-layout.css">
    
    <style>
        body {
            background-color: var(--admin-bg, #F7F8FC);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--admin-card-bg, #ffffff);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            margin: 20px;
        }
        .login-header {
            background: linear-gradient(135deg, var(--primary-color, #3D348B) 0%, #2b2466 100%);
            padding: 40px 30px 30px;
            text-align: center;
            color: white;
        }
        .login-body {
            padding: 40px 30px;
        }
        .login-header p {
            opacity: 0.8;
            font-size: 14px;
            margin-top: 5px !important;
        }
        .input-group-text {
            background-color: #F8FAFC !important;
        }
        .form-control {
            background-color: #F8FAFC !important;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <img src="../assets/images/logo.png" alt="Delta International School Logo" style="height: 60px; margin-bottom: 15px;">
            <h3 class="fw-bold m-0 font-outfit">Secure Access</h3>
            <p class="m-0 text-white-50">Delta International School</p>
        </div>
        <div class="login-body">
            <div id="loginAlert" class="alert d-none shadow-sm rounded-3 py-2" role="alert"></div>

            <form id="adminLoginForm">
                <div class="mb-4">
                    <label class="form-label fw-semibold text-muted small text-uppercase">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-envelope text-muted"></i></span>
                        <input type="email" class="form-control border-start-0 bg-light" id="email" required>
                    </div>
                </div>
                
                <div class="mb-5">
                    <label class="form-label fw-semibold text-muted small text-uppercase">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0 bg-light" id="password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 py-3 rounded-pill fw-bold" id="loginBtn">
                    Login to Dashboard <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                </button>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-muted"><a href="/home" class="text-decoration-none"><i class="fa-solid fa-arrow-left me-1"></i> Back to Website</a></small>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/ui-modals.js"></script>
    
    <script>
        // Check if cookie exists by pinging a protected route or relying on server redirect
        // For simplicity, we just let them try to log in. If they are already logged in,
        // they can still log in again and the cookie gets updated.

        if (window.location.port !== '5000' && window.location.protocol !== 'https:') {
            
        UIModals.alert('Warning', 'You must access this page through the backend server at http://localhost:5000/admin-login.html. Redirecting...', 'warning').then(() => {
            window.location.href = 'http://localhost:5000/admin-login.html';
        });
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const alertBox = document.getElementById('loginAlert');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Authenticating...';
            btn.disabled = true;
            alertBox.classList.add('d-none');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alertBox.className = 'alert alert-success d-flex align-items-center mb-4';
                    alertBox.innerHTML = '<i class="fa-solid fa-check-circle me-2"></i> Login successful!';
                    alertBox.classList.remove('d-none');
                    
                    // Redirect immediately
                    setTimeout(() => {
                        window.location.href = '/admin-dashboard.html';
                    }, 500);
                } else {
                    alertBox.className = 'alert alert-danger d-flex align-items-center mb-4';
                    alertBox.innerHTML = '<i class="fa-solid fa-triangle-exclamation me-2"></i> ' + (data.message || 'Invalid credentials');
                    alertBox.classList.remove('d-none');
                    btn.innerHTML = 'Login to Dashboard <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>';
                    btn.disabled = false;
                }
            } catch (err) {
                alertBox.className = 'alert alert-danger d-flex align-items-center mb-4';
                alertBox.innerHTML = '<i class="fa-solid fa-triangle-exclamation me-2"></i> Error: ' + err.message;
                alertBox.classList.remove('d-none');
                btn.innerHTML = 'Login to Dashboard <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>';
                btn.disabled = false;
            }
        });


    </script>
    <script src="../assets/js/admin-layout.js"></script>
</body>
</html>
