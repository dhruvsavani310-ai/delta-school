    <script>
function checkAuth() {
            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.style.display = 'none';
            }, 300);
        }

        async function showLogoutModal() {
            const confirmed = await UIModals.confirm('Logout', 'Are you sure you want to logout?', 'Logout', 'danger');
            if(confirmed) {
                confirmLogout();
            }
        }

        async function confirmLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch(e) { console.error(e); }
            
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace('admin-login.html');
        }

checkAuth();

// Inject Page Specific Logic

async function loadTesti() {
    const res = await fetch('/api/testimonials');
    if (res.status === 401 || res.status === 403) { window.location.href = 'admin-login.html'; return; }
    const data = await res.json();
    
    if ($.fn.DataTable.isDataTable('#testiTableEl')) {
        $('#testiTableEl').DataTable().destroy();
    }

    let html = '';
    data.forEach(t => {
        html += `<tr>
            <td class="fw-bold">${t.name}</td>
            <td>${t.role}</td>
            <td class="text-truncate" style="max-width:200px;" title="${t.quote}">${t.quote}</td>
            <td><button class="btn btn-sm btn-outline-danger" onclick="deleteTesti('${t.id || t._id}')"><i class="fa-solid fa-trash"></i></button></td>
        </tr>`;
    });
    document.getElementById('testiTable').innerHTML = html;

    initAdminDataTable('#testiTableEl', {
        searchPlaceholder: "Search by Name or Role..."
    });
}
window.refreshTableData = loadTesti;

document.getElementById('testiForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    await fetch('/api/testimonials', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', },
        body: JSON.stringify({
            name: document.getElementById('tName').value,
            role: document.getElementById('tRole').value,
            quote: document.getElementById('tQuote').value
        })
    });
    document.getElementById('testiForm').reset();
    loadTesti();
});

async function deleteTesti(id) {
    if(await UIModals.confirm('Confirm', 'Delete testimonial?', 'Confirm', 'danger')) {
        
        await fetch('/api/testimonials/' + id, { method: 'DELETE' });
        loadTesti();
    }
}
loadTesti();

</script>

    <script>
        // Fetch and display user role
        async function fetchUserRole() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    const roleDisplay = document.getElementById('headerUserRoleDisplay');
                    if (roleDisplay) {
                        roleDisplay.innerText = user.role;
                    }
                }
            } catch (e) {
                console.error('Failed to fetch user role:', e);
            }
        }
        fetchUserRole();
    </script>
