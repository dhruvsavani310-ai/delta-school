    <script>
        function checkAuth() {
            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.style.display = 'none';
            }, 300);
        }
        
        async function showLogoutModal() {
            const confirmed = await UIModals.confirm('Logout', 'Are you sure you want to logout?', 'Logout', 'danger');
            if(confirmed) {
                confirmLogout();
            }
        }

        async function confirmLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch(e) { console.error(e); }
            
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace('admin-login.html');
        }

        checkAuth();
        
async function loadEvents() {
    try {
        const res = await fetch('/api/events');
        if (res.status === 401 || res.status === 403) { window.location.href = 'admin-login.html'; return; }
        const data = await res.json();
        
        if ($.fn.DataTable.isDataTable('#eventsTableEl')) {
            $('#eventsTableEl').DataTable().destroy();
        }

        const tbody = document.getElementById('eventsGrid');
        tbody.innerHTML = '';
        data.forEach(evt => {
            const dateObj = new Date(evt.eventDate || evt.date);
            let dateStr = 'Invalid Date';
            let rawDate = '';
            if (!isNaN(dateObj)) {
                dateStr = dateObj.toLocaleDateString();
                rawDate = dateObj.toISOString();
            }
            
            tbody.innerHTML += `
            <tr>
                <td><img src="${evt.imageUrl}" style="height: 50px; width: 80px; object-fit: cover; border-radius: 6px;"></td>
                <td class="fw-bold">${evt.title}</td>
                <td data-sort="${rawDate}">${dateStr}</td>
                <td>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteEvent('${evt.id || evt._id}')"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        });

        initAdminDataTable('#eventsTableEl', {
            searchPlaceholder: "Search by Event Title...",
            filtersHtml: `
                <select id="filterTime" class="form-select dt-custom-filter">
                    <option value="">All Time</option>
                    <option value="Upcoming">Upcoming</option>
                    <option value="Past">Past</option>
                </select>
            `,
            customFilterFn: function(settings, data, dataIndex) {
                const timeFilter = $('#filterTime').val();
                if (!timeFilter) return true;

                const dateStr = data[2]; // Date column
                const eventDate = new Date(dateStr);
                const today = new Date();
                today.setHours(0,0,0,0);
                
                if (timeFilter === 'Upcoming' && eventDate >= today) return true;
                if (timeFilter === 'Past' && eventDate < today) return true;
                
                return false;
            }
        });
    } catch(err) { console.error(err); }
}
window.refreshTableData = loadEvents;
document.getElementById('eImg').addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        document.getElementById('eImgPreview').src = URL.createObjectURL(file);
        document.getElementById('eImgPreviewContainer').classList.remove('d-none');
    } else {
        document.getElementById('eImgPreviewContainer').classList.add('d-none');
    }
});

document.getElementById('eventForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData();
    formData.append('title', document.getElementById('eTitle').value);
    formData.append('eventDate', document.getElementById('eDate').value);
    formData.append('description', document.getElementById('eDesc').value);
    formData.append('image', document.getElementById('eImg').files[0]);

    try {
        const res = await fetch('/api/events', { method: 'POST', body: formData });
        if(res.ok) {
            await UIModals.alert('Success', 'Event saved successfully!', 'success');
        } else {
            const data = await res.json();
            await UIModals.alert('Error', data.message || 'Error saving event', 'danger');
        }
    } catch(err) {
        await UIModals.alert('Error', 'Connection error', 'danger');
    }
    
    bootstrap.Modal.getInstance(document.getElementById('eventModal')).hide();
    document.getElementById('eventForm').reset();
    document.getElementById('eImgPreviewContainer').classList.add('d-none');
    loadEvents();
});
async function deleteEvent(id) {
    if(await UIModals.confirm('Confirm', 'Delete this event?', 'Confirm', 'danger')) {
        await fetch('/api/events/' + id, { method: 'DELETE' });
        loadEvents();
    }
}
loadEvents();

    </script>

    <script>
        // Fetch and display user role
        async function fetchUserRole() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    const roleDisplay = document.getElementById('headerUserRoleDisplay');
                    if (roleDisplay) {
                        roleDisplay.innerText = user.role;
                    }
                }
            } catch (e) {
                console.error('Failed to fetch user role:', e);
            }
        }
        fetchUserRole();
    </script>
