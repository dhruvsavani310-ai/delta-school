    <script>
        function checkAuth() {
            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.style.display = 'none';
            }, 300);
        }
        
        async function showLogoutModal() {
            const confirmed = await UIModals.confirm('Logout', 'Are you sure you want to logout?', 'Logout', 'danger');
            if(confirmed) {
                confirmLogout();
            }
        }

        async function confirmLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch(e) { console.error(e); }
            
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace('admin-login.html');
        }

        checkAuth();
        
async function loadEnquiries() {
    try {
        const res = await fetch('/api/enquiries');
        if (res.status === 401 || res.status === 403) { window.location.href = 'admin-login.html'; return; }
        const data = await res.json();
        
        if ($.fn.DataTable.isDataTable('#enquiriesTableEl')) {
            $('#enquiriesTableEl').DataTable().destroy();
        }

        const tbody = document.getElementById('enquiriesTable');
        tbody.innerHTML = '';
        data.forEach(enq => {
            const dateStr = enq.createdAt ? new Date(enq.createdAt).toLocaleDateString() : '-';
            tbody.innerHTML += `
            <tr>
                <td class="fw-bold">${enq.name}</td>
                <td>${enq.email}<br><small class="text-muted">${enq.mobile}</small></td>
                <td style="max-width: 250px;" class="text-truncate" title="${enq.message}">${enq.message}</td>
                <td>${dateStr}</td>
                <td>
                    <select class="form-select form-select-sm ${enq.status === 'Resolved' ? 'bg-success text-white' : ''}" onchange="updateStatus('${enq.id}', this.value)">
                        <option value="Pending" ${enq.status === 'Pending' ? 'selected' : ''}>Pending</option>
                        <option value="Reviewed" ${enq.status === 'Reviewed' ? 'selected' : ''}>Reviewed</option>
                        <option value="Resolved" ${enq.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
                    </select>
                </td>
                <td>
                    <button class="btn btn-sm btn-danger" onclick="deleteEnquiry('${enq.id}')"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        });

        const uniqueStatuses = [...new Set(data.map(d => d.status))].filter(Boolean).sort();

        initAdminDataTable('#enquiriesTableEl', {
            searchPlaceholder: "Search by Name, Email, Phone...",
            filtersHtml: `
                <select id="filterStatus" class="form-select dt-custom-filter">
                    <option value="">All Statuses</option>
                    ${uniqueStatuses.map(s => `<option value="${s}">${s}</option>`).join('')}
                </select>
            `,
            customFilterFn: function(settings, data, dataIndex) {
                const statusVal = ($('#filterStatus').val() || '').toLowerCase();
                const rowStatus = data[4].toLowerCase();
                
                if (statusVal && !rowStatus.includes(statusVal)) return false;
                return true;
            }
        });
    } catch(err) { console.error(err); }
}

window.refreshTableData = loadEnquiries;
async function updateStatus(id, status) {
    await fetch('/api/enquiries/' + id, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status}) });
    loadEnquiries();
}
async function deleteEnquiry(id) {
    if(await UIModals.confirm('Confirm', 'Are you sure you want to delete this enquiry?', 'Confirm', 'danger')) {
        await fetch('/api/enquiries/' + id, { method: 'DELETE' });
        loadEnquiries();
    }
}
loadEnquiries();

    <script>
        // Fetch and display user role
        async function fetchUserRole() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    const roleDisplay = document.getElementById('headerUserRoleDisplay');
                    if (roleDisplay) {
                        roleDisplay.innerText = user.role;
                    }
                }
            } catch (e) {
                console.error('Failed to fetch user role:', e);
            }
        }
        fetchUserRole();
    </script>
