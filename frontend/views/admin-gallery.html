    <script>
        function checkAuth() {
            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.style.display = 'none';
            }, 300);
        }
        
        async function showLogoutModal() {
            const confirmed = await UIModals.confirm('Logout', 'Are you sure you want to logout?', 'Logout', 'danger');
            if(confirmed) {
                confirmLogout();
            }
        }

        async function confirmLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch(e) { console.error(e); }
            
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace('admin-login.html');
        }

        checkAuth();
        
async function loadGallery() {
    try {
        const res = await fetch('/api/gallery');
        if (res.status === 401 || res.status === 403) { window.location.href = 'admin-login.html'; return; }
        const data = await res.json();
        
        if ($.fn.DataTable.isDataTable('#galleryTableEl')) {
            $('#galleryTableEl').DataTable().destroy();
        }

        const tbody = document.getElementById('galleryGrid');
        tbody.innerHTML = '';
        data.forEach(item => {
            const dateStr = item.createdAt ? new Date(item.createdAt).toLocaleDateString() : '-';
            tbody.innerHTML += `
            <tr>
                <td><img src="${item.imageUrl}" style="height: 50px; width: 80px; object-fit: cover; border-radius: 6px;"></td>
                <td class="fw-bold">${item.title}</td>
                <td><span class="badge bg-light text-dark border">${item.category}</span></td>
                <td>${dateStr}</td>
                <td>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteGallery('${item.id || item._id}')"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        });

        const uniqueCategories = [...new Set(data.map(item => item.category))].filter(Boolean).sort();

        initAdminDataTable('#galleryTableEl', {
            searchPlaceholder: "Search by Image Title...",
            filtersHtml: `
                <select id="filterCategory" class="form-select dt-custom-filter">
                    <option value="">All Categories</option>
                    ${uniqueCategories.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
            `,
            customFilterFn: function(settings, data, dataIndex) {
                const catVal = ($('#filterCategory').val() || '').toLowerCase();
                const rowCat = data[2].toLowerCase(); // Category column
                if (catVal && !rowCat.includes(catVal)) return false;
                return true;
            }
        });
    } catch(err) { console.error(err); }
}
window.refreshTableData = loadGallery;
document.getElementById('gImg').addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        document.getElementById('gImgPreview').src = URL.createObjectURL(file);
        document.getElementById('gImgPreviewContainer').classList.remove('d-none');
    } else {
        document.getElementById('gImgPreviewContainer').classList.add('d-none');
    }
});

document.getElementById('galleryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData();
    formData.append('title', document.getElementById('gTitle').value);
    formData.append('category', document.getElementById('gCategory').value);
    formData.append('image', document.getElementById('gImg').files[0]);

    try {
        const res = await fetch('/api/gallery', { method: 'POST', body: formData });
        if(res.ok) {
            await UIModals.alert('Success', 'Photo uploaded successfully!', 'success');
        } else {
            const data = await res.json();
            await UIModals.alert('Error', data.message || 'Error uploading photo', 'danger');
        }
    } catch(err) {
        await UIModals.alert('Error', 'Connection error', 'danger');
    }
    
    bootstrap.Modal.getInstance(document.getElementById('galleryModal')).hide();
    document.getElementById('galleryForm').reset();
    document.getElementById('gImgPreviewContainer').classList.add('d-none');
    loadGallery();
});
async function deleteGallery(id) {
    if(await UIModals.confirm('Confirm', 'Delete this photo?', 'Confirm', 'danger')) {
        await fetch('/api/gallery/' + id, { method: 'DELETE' });
        loadGallery();
    }
}
loadGallery();

    <script>
        // Fetch and display user role
        async function fetchUserRole() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    const roleDisplay = document.getElementById('headerUserRoleDisplay');
                    if (roleDisplay) {
                        roleDisplay.innerText = user.role;
                    }
                }
            } catch (e) {
                console.error('Failed to fetch user role:', e);
            }
        }
        fetchUserRole();
    </script>
