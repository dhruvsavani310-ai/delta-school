    <!-- Main Content -->
    <div class="main-content">
        <!-- Topbar -->
        <div class="topbar">
            <button id="mobileMenuToggle" class="mobile-toggle-btn d-md-none"><i class="fa-solid fa-bars"></i></button>
            <h4 class="mb-0 fw-bold" style="color: var(--primary-color);">Manage Admin Users</h4>
            <div class="d-flex align-items-center">
                <div class="me-3 text-end">
                    <span class="d-block fw-bold" id="headerUserRoleDisplay" style="font-size: 14px;">Loading...</span>
                    <span class="d-block text-muted" style="font-size: 12px; cursor: pointer;" onclick="showLogoutModal()">Log out</span>
                </div>
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </div>

        <div class="row g-4" id="contentArea">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white p-4 border-0"><h5 class="fw-bold mb-0">Create Admin Account</h5></div>
                    <div class="card-body p-4 pt-0">
                        <div id="adminAlert" class="alert d-none py-2"></div>
                        <form id="adminForm">
                            <div class="mb-3">
                                <label>Email Address</label>
                                <input type="email" id="aEmail" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" id="aPassword" class="form-control" required minlength="6">
                            </div>
                            <div class="mb-4">
                                <label>Role</label>
                                <select id="aRole" class="form-select">
                                    <option value="Admin">Admin (Limited)</option>
                                    <option value="Super Admin">Super Admin (Full Access)</option>
                                    <option value="Staff">Staff</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Create Account</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white p-4 border-0"><h5 class="fw-bold mb-0">Existing Admin Accounts</h5></div>
                    <div class="card-body p-4 pt-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle" id="adminUsersTableEl" style="width:100%">
                                <thead>
                                    <tr>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Created At</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="adminTableBody">
                                    <tr class="skeleton-row"><td colspan="4"><div class="skeleton-box"></div></td></tr>
                                    <tr class="skeleton-row"><td colspan="4"><div class="skeleton-box"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </div>

    <!-- Edit Admin Modal -->
    <div class="modal fade" id="editAdminModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Admin</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editAdminForm">
                        <input type="hidden" id="editAdminId">
                        <div class="mb-3">
                            <label>Role</label>
                            <select id="editAdminRole" class="form-select">
                                <option value="Admin">Admin (Limited)</option>
                                <option value="Super Admin">Super Admin (Full Access)</option>
                                <option value="Staff">Staff</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>New Password (leave blank to keep current)</label>
                            <input type="password" id="editAdminPassword" class="form-control" minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script>
        function checkAuth() {
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 300);
        }
        
        
        async function showLogoutModal() {
            const confirmed = await UIModals.confirm('Logout', 'Are you sure you want to logout?', 'Logout', 'danger');
            if(confirmed) {
                confirmLogout();
            }
        }

        async function confirmLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch(e) { console.error(e); }
            
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace('admin-login.html');
        }

        
        checkAuth();

        // Inject Page Specific Logic
        async function loadAdmins() {
            try {
                const res = await fetch('/api/auth/admins');
                if (res.status === 403) {
                    document.getElementById('contentArea').innerHTML = `
                        <div class="col-12">
                            <div class="alert alert-danger p-4 text-center">
                                <i class="fa-solid fa-lock fs-1 mb-3"></i>
                                <h4>Access Denied</h4>
                                <p>You do not have permission to view or manage admin accounts. This area is restricted to Super Admins.</p>
                            </div>
                        </div>
                    `;
                    return;
                }
                const admins = await res.json();
                
                if ($.fn.DataTable.isDataTable('#adminUsersTableEl')) {
                    $('#adminUsersTableEl').DataTable().destroy();
                }

                let html = '';
                admins.forEach(a => {
                    html += `
                    <tr>
                        <td class="fw-bold">${a.email}</td>
                        <td><span class="badge ${a.role === 'Super Admin' ? 'bg-primary' : (a.role === 'Staff' ? 'bg-info' : 'bg-secondary')}">${a.role}</span></td>
                        <td>${new Date(a.createdAt).toLocaleDateString()}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="openEditModal('${a.id}', '${a.role}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteAdmin('${a.id}')"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>`;
                });
                document.getElementById('adminTableBody').innerHTML = html;

                const uniqueRoles = [...new Set(admins.map(a => a.role))].filter(Boolean).sort();

                initAdminDataTable('#adminUsersTableEl', {
                    searchPlaceholder: "Search by Email...",
                    filtersHtml: `
                        <select id="filterRole" class="form-select dt-custom-filter">
                            <option value="">All Roles</option>
                            ${uniqueRoles.map(r => `<option value="${r}">${r}</option>`).join('')}
                        </select>
                    `,
                    customFilterFn: function(settings, data, dataIndex) {
                        const roleVal = ($('#filterRole').val() || '').toLowerCase();
                        const rowRole = data[1].toLowerCase(); // Role column
                        if (roleVal && !rowRole.includes(roleVal)) return false;
                        return true;
                    }
                });

            } catch (e) {
                console.error(e);
            }
        }
        window.refreshTableData = loadAdmins;

        document.getElementById('adminForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('adminAlert');
            const email = document.getElementById('aEmail').value;
            const password = document.getElementById('aPassword').value;
            const role = document.getElementById('aRole').value;
            
            try {
                const res = await fetch('/api/auth/admins', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });
                
                const data = await res.json();
                if (res.ok) {
                    alertBox.className = 'alert alert-success d-block';
                    alertBox.innerText = data.message;
                    document.getElementById('adminForm').reset();
                    loadAdmins();
                } else {
                    alertBox.className = 'alert alert-danger d-block';
                    alertBox.innerText = data.message;
                }
            } catch (err) {
                alertBox.className = 'alert alert-danger d-block';
                alertBox.innerText = 'Server error occurred.';
            }
        });

        async function deleteAdmin(id) {
            if(await UIModals.confirm('Confirm', 'Are you sure you want to delete this admin account?', 'Confirm', 'danger')) {
                const res = await fetch('/api/auth/admins/' + id, { method: 'DELETE' });
                if (res.status === 401 || res.status === 403) { window.location.href = 'admin-login.html'; return; }
                const data = await res.json();
                if(res.ok) {
                    loadAdmins();
                } else {
                    await UIModals.alert('Error', data.message, 'danger');
                }
            }
        }

        let editModal;
        document.addEventListener('DOMContentLoaded', () => {
            editModal = new bootstrap.Modal(document.getElementById('editAdminModal'));
        });

        function openEditModal(id, currentRole) {
            document.getElementById('editAdminId').value = id;
            document.getElementById('editAdminRole').value = currentRole;
            document.getElementById('editAdminPassword').value = '';
            editModal.show();
        }

        document.getElementById('editAdminForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editAdminId').value;
            const role = document.getElementById('editAdminRole').value;
            const password = document.getElementById('editAdminPassword').value;
            
            try {
                const res = await fetch('/api/auth/admins/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, password })
                });
                if(res.ok) {
                    editModal.hide();
                    loadAdmins();
                } else {
                    const data = await res.json();
                    await UIModals.alert('Error', data.message, 'danger');
                }
            } catch(e) { console.error(e); }
        });

        loadAdmins();
    </script>

    <script>
        // Fetch and display user role
        async function fetchUserRole() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    const roleDisplay = document.getElementById('headerUserRoleDisplay');
                    if (roleDisplay) {
                        roleDisplay.innerText = user.role;
                    }
                }
            } catch (e) {
                console.error('Failed to fetch user role:', e);
            }
        }
        fetchUserRole();
    </script>
