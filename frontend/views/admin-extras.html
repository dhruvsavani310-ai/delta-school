<body>

                <a href="/admin-dashboard" class="nav-item"><i class="fa-solid fa-table-columns"></i> <span>Dashboard</span></a>

    <div class="main-content">
        <div class="topbar">
            <button id="mobileMenuToggle" class="mobile-toggle-btn d-md-none"><i class="fa-solid fa-bars"></i></button>
            <h4 class="mb-0 fw-bold" style="color: var(--primary-color);">Manage Extra Features</h4>
            <div class="d-flex align-items-center">
                <div class="me-3 text-end">
                    <span class="d-block fw-bold" id="headerUserRoleDisplay" style="font-size: 14px;">Loading...</span>
                    <span class="d-block text-muted" style="font-size: 12px; cursor: pointer;" onclick="showLogoutModal()">Log out</span>
                </div>
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;"><i class="fa-solid fa-user"></i></div>
            </div>
        </div>

        
<div class="row g-4">
    <!-- Notice Board -->
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-header bg-white p-4 border-0 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold"><i class="fa-solid fa-bullhorn text-warning me-2"></i> Notice Board</h5>
                <button class="btn btn-sm btn-primary" onclick="addNotice()"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div class="card-body p-4 pt-0">
                <ul class="list-group list-group-flush" id="noticesList">Loading...</ul>
            </div>
        </div>
    </div>

    <!-- Circulars -->
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-header bg-white p-4 border-0 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold"><i class="fa-solid fa-file-pdf text-danger me-2"></i> Circulars</h5>
                <button class="btn btn-sm btn-primary" onclick="addCircular()"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div class="card-body p-4 pt-0">
                <ul class="list-group list-group-flush" id="circularsList">Loading...</ul>
            </div>
        </div>
    </div>
</div>

    </div>

    
    
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/ui-modals.js"></script>
    <script>
        function checkAuth() {
            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.style.display = 'none';
            }, 300);
        }
        
        async function showLogoutModal() {
            const confirmed = await UIModals.confirm('Logout', 'Are you sure you want to logout?', 'Logout', 'danger');
            if(confirmed) {
                confirmLogout();
            }
        }

        async function confirmLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch(e) { console.error(e); }
            
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace('admin-login.html');
        }

        checkAuth();
        
async function loadNotices() {
    const res = await fetch('/api/notices/all');
    if (res.status === 401 || res.status === 403) { window.location.href = 'admin-login.html'; return; }
        const data = await res.json();
    const list = document.getElementById('noticesList');
    list.innerHTML = '';
    data.forEach(n => {
        list.innerHTML += `<li class="list-group-item d-flex justify-content-between align-items-center px-0">
            <div><h6 class="mb-0">${n.title}</h6><small class="text-muted">${new Date(n.noticeDate).toLocaleDateString()}</small></div>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteNotice('${n.id}')"><i class="fa-solid fa-trash"></i></button>
        </li>`;
    });
}
async function loadCirculars() {
    const res = await fetch('/api/circulars');
    if (res.status === 401 || res.status === 403) { window.location.href = 'admin-login.html'; return; }
        const data = await res.json();
    const list = document.getElementById('circularsList');
    list.innerHTML = '';
    data.forEach(c => {
        list.innerHTML += `<li class="list-group-item d-flex justify-content-between align-items-center px-0">
            <div><h6 class="mb-0">${c.title}</h6><a href="${c.pdfUrl}" target="_blank" class="small text-decoration-none">View PDF</a></div>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteCircular('${c.id}')"><i class="fa-solid fa-trash"></i></button>
        </li>`;
    });
}

async function addNotice() {
    const title = await UIModals.prompt("Enter Notice Title:");
    if(!title) return;
    const pdfUrl = await UIModals.prompt("Enter PDF/Link URL (optional):") || '#';
    await fetch('/api/notices', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title, noticeDate: new Date(), pdfUrl, isActive: true}) });
    loadNotices();
}
async function addCircular() {
    const title = await UIModals.prompt("Enter Circular Title:");
    if(!title) return;
    const pdfUrl = await UIModals.prompt("Enter PDF URL:") || '#';
    await fetch('/api/circulars', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title, publishDate: new Date(), pdfUrl}) });
    loadCirculars();
}

async function deleteNotice(id) {
    if(await UIModals.confirm('Confirm', 'Delete?', 'Confirm', 'danger')) { await fetch('/api/notices/'+id, {method:'DELETE'}); loadNotices(); }
}
async function deleteCircular(id) {
    if(await UIModals.confirm('Confirm', 'Delete?', 'Confirm', 'danger')) { await fetch('/api/circulars/'+id, {method:'DELETE'}); loadCirculars(); }
}

loadNotices();
loadCirculars();

    </script>

    <script>
        // Fetch and display user role
        async function fetchUserRole() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    const roleDisplay = document.getElementById('headerUserRoleDisplay');
                    if (roleDisplay) {
                        roleDisplay.innerText = user.role;
                    }
                }
            } catch (e) {
                console.error('Failed to fetch user role:', e);
            }
        }
        fetchUserRole();
    </script>
    <script src="../assets/js/admin-layout.js"></script>
</body>
</html>
