    <script>
        function checkAuth() {
            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.style.display = 'none';
            }, 300);
        }
        
        async function showLogoutModal() {
            const confirmed = await UIModals.confirm('Logout', 'Are you sure you want to logout?', 'Logout', 'danger');
            if(confirmed) {
                confirmLogout();
            }
        }

        async function confirmLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch(e) { console.error(e); }
            
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace('admin-login.html');
        }

        checkAuth();
        
async function loadAdmissions() {
    try {
        const res = await fetch('/api/admissions');
        if (res.status === 401 || res.status === 403) { window.location.href = 'admin-login.html'; return; }
        const data = await res.json();
        
        if ($.fn.DataTable.isDataTable('#admissionsTableEl')) {
            $('#admissionsTableEl').DataTable().destroy();
        }

        const tbody = document.getElementById('admissionsTable');
        tbody.innerHTML = '';
        data.forEach(adm => {
            tbody.innerHTML += `
            <tr>
                <td class="fw-bold">${adm.studentName}<br><small class="text-muted">${adm.gender}</small></td>
                <td>${adm.classApplyingFor}</td>
                <td><span class="badge bg-secondary">${adm.mediumOfInstruction === 'gujarati' ? 'Gujarati' : 'English'}</span></td>
                <td>${adm.fatherName}<br><small class="text-muted">${adm.mobile}</small></td>
                <td>
                    <a href="${adm.studentPhoto}" target="_blank" class="badge bg-primary text-decoration-none">Photo</a>
                    <a href="${adm.birthCertificate}" target="_blank" class="badge bg-info text-decoration-none">Birth Cert</a>
                </td>
                <td>
                    <select class="form-select form-select-sm" onchange="updateStatus('${adm.id}', this.value)">
                        <option value="Pending" ${adm.status === 'Pending' ? 'selected' : ''}>Pending</option>
                        <option value="Reviewed" ${adm.status === 'Reviewed' ? 'selected' : ''}>Reviewed</option>
                        <option value="Accepted" ${adm.status === 'Accepted' ? 'selected' : ''}>Accepted</option>
                        <option value="Rejected" ${adm.status === 'Rejected' ? 'selected' : ''}>Rejected</option>
                    </select>
                </td>
                <td>
                    <button class="btn btn-sm btn-danger" onclick="deleteAdmission('${adm.id}')"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        });

        const uniqueClasses = [...new Set(data.map(d => d.classApplyingFor))].filter(Boolean).sort();
        const uniqueGenders = [...new Set(data.map(d => d.gender))].filter(Boolean).sort();
        const uniqueStatuses = [...new Set(data.map(d => d.status))].filter(Boolean).sort();
        const uniqueMediums = [...new Set(data.map(d => d.mediumOfInstruction === 'gujarati' ? 'Gujarati' : 'English'))].filter(Boolean).sort();

        initAdminDataTable('#admissionsTableEl', {
            searchPlaceholder: "Search by Student Name, Parent Name, Mobile...",
            filtersHtml: `
                <select id="filterClass" class="form-select dt-custom-filter">
                    <option value="">All Classes</option>
                    ${uniqueClasses.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
                <select id="filterMedium" class="form-select dt-custom-filter">
                    <option value="">All Mediums</option>
                    ${uniqueMediums.map(m => `<option value="${m}">${m}</option>`).join('')}
                </select>
                <select id="filterGender" class="form-select dt-custom-filter">
                    <option value="">All Genders</option>
                    ${uniqueGenders.map(g => `<option value="${g}">${g}</option>`).join('')}
                </select>
                <select id="filterStatus" class="form-select dt-custom-filter">
                    <option value="">All Statuses</option>
                    ${uniqueStatuses.map(s => `<option value="${s}">${s}</option>`).join('')}
                </select>
            `,
            customFilterFn: function(settings, data, dataIndex) {
                const classVal = ($('#filterClass').val() || '').toLowerCase();
                const mediumVal = ($('#filterMedium').val() || '').toLowerCase();
                const genderVal = ($('#filterGender').val() || '').toLowerCase();
                const statusVal = ($('#filterStatus').val() || '').toLowerCase();
                
                const rowClass = data[1].toLowerCase();
                const rowMedium = data[2].toLowerCase(); // Medium is at index 2
                const rowStudent = data[0].toLowerCase();
                const rowStatus = data[5].toLowerCase(); // Status shifted to index 5
                
                if (classVal && !rowClass.includes(classVal)) return false;
                if (mediumVal && !rowMedium.includes(mediumVal)) return false;
                if (genderVal && !rowStudent.includes(genderVal)) return false;
                if (statusVal && !rowStatus.includes(statusVal)) return false;
                return true;
            }
        });
    } catch(err) { console.error(err); }
}

window.refreshTableData = loadAdmissions;
async function updateStatus(id, status) {
    await fetch('/api/admissions/' + id, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status}) });
    loadAdmissions();
}
async function deleteAdmission(id) {
    if(await UIModals.confirm('Confirm', 'Are you sure you want to delete this admission?', 'Confirm', 'danger')) {
        await fetch('/api/admissions/' + id, { method: 'DELETE' });
        loadAdmissions();
    }
}
loadAdmissions();

    <script>
        // Fetch and display user role
        async function fetchUserRole() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    const roleDisplay = document.getElementById('headerUserRoleDisplay');
                    if (roleDisplay) {
                        roleDisplay.innerText = user.role;
                    }
                }
            } catch (e) {
                console.error('Failed to fetch user role:', e);
            }
        }
        fetchUserRole();
    </script>
